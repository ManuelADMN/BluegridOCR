version: "3.8"

services:
  backend:
    build:
      context: ./Deploy/backend_api
      dockerfile: Dockerfile
    container_name: bluegridocr_backend
    restart: unless-stopped
    env_file:
      - ./Deploy/backend_api/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./Front
      dockerfile: Dockerfile
    container_name: bluegridocr_frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
