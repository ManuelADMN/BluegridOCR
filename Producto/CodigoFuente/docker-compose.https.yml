version: "3.8"

services:
  backend:
    environment:
      HTTPS_ENABLED: "true"
      HOST: "0.0.0.0"
      PORT: "8000"
      SSL_CERTFILE: "/certs/fullchain.pem"
      SSL_KEYFILE: "/certs/privkey.pem"
      ALLOWED_ORIGINS: "https://localhost:3000,https://127.0.0.1:3000"
    volumes:
      - ./certs/prod:/certs:ro
    ports:
      - "8000:8000"

  frontend:
    volumes:
      - ./Front/nginx.https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/prod:/etc/nginx/certs:ro
    ports:
      - "3000:443"
